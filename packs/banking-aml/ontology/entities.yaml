# Domain ontology (dataset-service inc11): the entity TYPES this vertical
# operates on and their typed relationships — the type-level model behind the
# aml_parties / aml_transactions / aml_alerts / aml_relationship_edges
# binding contracts. Attribute names match the contract columns so the
# ontology describes data the bound tenant datasets actually carry. This is
# the data-unification contract entity resolution (BRD 56) resolves INSTANCES
# of: duplicate party records merge into one golden `party`, and the
# `party_relationship` edges (shared directors, ownership chains, wire flows)
# are the instance-level graph resolved instances participate in.
- entity_key: party
  name: Party
  description: >-
    A customer of the institution (individual or business) — the KYC book
    entry alerts and monitored transactions attach to.
  attributes:
    - { name: party_name, data_type: string }
    - { name: party_type, data_type: string, description: "individual | business" }
    - { name: sic_code, data_type: string, description: "Declared industry classification" }
    - { name: declared_business, data_type: string }
    - { name: party_jurisdiction, data_type: string }
    - { name: risk_rating, data_type: string, description: "Institution-assigned customer risk rating" }
    - { name: kyc_status, data_type: string }
    - { name: pep_flag, data_type: string, description: "Politically-exposed-person flag (yes | no)" }
    - { name: expected_monthly_volume, data_type: float, description: "Declared expected activity — the peer/profile-deviation baseline" }
  relationships:
    - { name: transactions, target: transaction, cardinality: has_many }
    - { name: alerts, target: alert, cardinality: has_many }
    - { name: relationships, target: party_relationship, cardinality: has_many }
- entity_key: counterparty
  name: Counterparty
  description: >-
    The external party on the other side of a monitored transaction (often
    not a customer) — the far end of wire chains and funnel patterns.
  attributes:
    - { name: counterparty_jurisdiction, data_type: string }
  relationships:
    - { name: transactions, target: transaction, cardinality: has_many }
- entity_key: transaction
  name: "Monitored transaction"
  description: >-
    A payment/deposit event the monitoring system observes (cash, wire, ACH),
    with direction, branch, and cross-border context.
  attributes:
    - { name: txn_date, data_type: date }
    - { name: channel, data_type: string, description: "cash | wire | ach ..." }
    - { name: direction, data_type: string, description: "credit | debit" }
    - { name: amount, data_type: float }
    - { name: counterparty_jurisdiction, data_type: string }
    - { name: branch_id, data_type: string }
    - { name: cross_border, data_type: string, description: "yes | no" }
  relationships:
    - { name: party, target: party, cardinality: belongs_to }
    - { name: counterparty, target: counterparty, cardinality: belongs_to }
- entity_key: alert
  name: "AML alert"
  description: >-
    A monitoring-scenario or sanctions-screening hit on one party/account,
    carrying typology, severity, tier, aging, exposure, and its human
    disposition once triaged.
  attributes:
    - { name: typology, data_type: string }
    - { name: scenario_rule, data_type: string }
    - { name: severity, data_type: string }
    - { name: status, data_type: string, description: "open | closed" }
    - { name: disposition, data_type: string, description: "Human triage outcome once closed" }
    - { name: assigned_tier, data_type: string }
    - { name: age_days, data_type: integer }
    - { name: amount_involved, data_type: float }
    - { name: match_score, data_type: float, description: "Sanctions fuzzy name-match score (0 for non-sanctions alerts)" }
  relationships:
    - { name: party, target: party, cardinality: belongs_to }
- entity_key: party_relationship
  name: "Party relationship edge"
  description: >-
    A typed directed edge between two parties/counterparties — wire flows,
    shared directors, beneficial-ownership links — the network layering
    chains and OFAC 50-percent-rule ownership walks traverse.
  attributes:
    - { name: edge_type, data_type: string, description: "wire_transfer | shared_director | ownership ..." }
    - { name: weight, data_type: float }
  relationships:
    - { name: source, target: party, cardinality: belongs_to }
    - { name: destination, target: party, cardinality: belongs_to }
