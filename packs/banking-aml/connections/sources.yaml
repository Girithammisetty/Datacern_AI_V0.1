# Governed source-connector templates (ingestion-service inc13): INCOMING
# connections pre-declared with skip_test + EMPTY secrets, so the bank's
# expected feeds exist as governed starting points the tenant completes with
# real hosts/credentials in Data → Connections. Nothing is polled at install.
- name: "ISO 20022 payment message drop (SFTP)"
  connector_type: sftp
  direction: incoming
  config:
    host: "payments-gateway.example.invalid"
    port: 22
    username: datacern_ingest
    root_directory: "/outbound/iso20022/pacs008"
- name: "Core-banking batch extracts (S3)"
  connector_type: s3
  direction: incoming
  config:
    region: us-east-1
    bucket: core-banking-aml-extracts
    root_prefix: "daily/"
    file_format: csv
    glob: "*.csv"
