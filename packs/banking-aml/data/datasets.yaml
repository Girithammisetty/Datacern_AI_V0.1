# Pack dataset BINDING CONTRACTS (no-dummy-data rule): the pack ships ZERO
# seed data. Each entry declares the dataset the AML workflow needs and the
# exact landing-shape columns it requires; at install the tenant binds it to a
# REAL dataset (explicit dataset_bindings on the install request, or same-name
# reuse), and pack-service validates the bound dataset exposes every required
# column — failing closed with the missing list. Real data arrives through the
# pack's governed source connectors (connections/sources.yaml — the tenant's
# core-banking + payment-message feeds) or file upload.
- identity: aml_parties
  name: aml-parties
  required_columns:
    [party_id, party_name, party_type, sic_code, declared_business,
     party_jurisdiction, risk_rating, kyc_status, pep_flag, onboard_month,
     expected_monthly_volume]
- identity: aml_transactions
  name: aml-transactions
  required_columns:
    [txn_id, party_id, account_id, txn_date, txn_month, channel, direction,
     amount, counterparty_id, counterparty_jurisdiction, branch_id,
     cross_border]
- identity: aml_alerts
  name: aml-alerts
  required_columns:
    [alert_id, party_id, account_id, typology, scenario_rule, severity,
     status, disposition, assigned_tier, alert_month, age_days,
     amount_involved, match_score]
- identity: aml_relationship_edges
  name: aml-relationship-edges
  required_columns:
    [src_id, dst_id, edge_type, weight]
