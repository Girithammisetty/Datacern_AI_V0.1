# Governed model blueprints (experiment-service inc9): the intended models
# this vertical runs, independent of any trained artifact. Each corresponds to
# a training pipeline this pack already ships (pipelines/templates.yaml), so
# the blueprint and its implementation stay in one governed pair.
- archetype_key: rcm_denial_risk_classifier
  name: "Denial risk classifier"
  task_type: classification
  target: status
  description: >-
    Supervised scorer over the bound claims table (rcm-claims): predicts the
    likelihood a claim is denied from payer, service line, CPT/ICD coding,
    charge amounts, and clean-claim/first-pass history — the pre-bill
    prioritizer for denial prevention and the work-queue ranker for the
    denials worklist. Implemented by the pack's xgboost training pipeline.
  expected_metrics: { f1: 0.80 }
  governance_notes: >-
    Scores order the work queue only — appeal, corrected-resubmit, and
    write-off decisions are four-eyes human determinations (BRD 26 BR-1:
    autonomous billing writes are forbidden). Promotion requires eval-gate +
    manager approval.
- archetype_key: rcm_underpayment_anomaly_detector
  name: "Remit underpayment anomaly detector"
  task_type: anomaly_detection
  target: null
  description: >-
    Unsupervised surface scan over the bound 835 remit lines (rcm-remits) for
    payment-variance outliers against the contracted expectation — the
    dispute-candidate feeder for underpayment recovery (RCM-FR-050).
    Implemented by the pack's isolation-forest training pipeline.
  expected_metrics: {}
  governance_notes: >-
    Detector output opens review work, never adverse action; flagged remit
    lines route to the underpayment-dispute worklist where a human drafts and
    approves any payer dispute inside the contract window (BR-5).
