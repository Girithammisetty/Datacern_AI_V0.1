# Domain ontology (dataset-service inc11): the entity TYPES the provider
# revenue cycle operates on and their typed relationships — the type-level
# model behind the rcm_claims / rcm_remits / rcm_denials / rcm_ar_aging
# binding contracts. Attribute names match the contract columns so the
# ontology describes data the tenant actually binds. Patient identity stays
# de-identified: only account/encounter references, never PHI demographics.
- entity_key: encounter
  name: "Patient encounter"
  description: >-
    The de-identified visit/service event a claim bills for — referenced by
    encounter and patient-account identifiers only (no PHI demographics).
  attributes:
    - { name: patient_account_id, data_type: string, description: "De-identified patient account reference" }
    - { name: rendering_provider_npi, data_type: string }
    - { name: service_line, data_type: string }
  relationships:
    - { name: claims, target: claim, cardinality: has_many }
- entity_key: payer
  name: Payer
  description: "The insurance payer (commercial, Medicare, Medicaid) adjudicating claims."
  attributes:
    - { name: payer_name, data_type: string }
    - { name: payer_type, data_type: string, description: "commercial | medicare | medicaid" }
  relationships:
    - { name: claims, target: claim, cardinality: has_many }
    - { name: remittances, target: remittance, cardinality: has_many }
    - { name: denials, target: denial, cardinality: has_many }
- entity_key: claim
  name: "Claim (837)"
  description: >-
    A billed professional/institutional claim line: coding, charge amounts,
    contractual expectation, and its clean-claim / first-pass outcome flags.
  attributes:
    - { name: cpt_code, data_type: string }
    - { name: icd10_code, data_type: string }
    - { name: service_line, data_type: string }
    - { name: service_month, data_type: string }
    - { name: billed_amount, data_type: float }
    - { name: net_charges, data_type: float }
    - { name: expected_paid, data_type: float }
    - { name: paid_amount, data_type: float }
    - { name: status, data_type: string }
    - { name: clean_claim, data_type: string }
    - { name: first_pass, data_type: string }
  relationships:
    - { name: encounter, target: encounter, cardinality: belongs_to }
    - { name: payer, target: payer, cardinality: belongs_to }
    - { name: remittances, target: remittance, cardinality: has_many }
    - { name: denials, target: denial, cardinality: has_many }
    - { name: ar_items, target: ar_item, cardinality: has_many }
- entity_key: remittance
  name: "Remittance line (835)"
  description: >-
    A payer remittance-advice line: allowed/paid amounts against the
    contracted expectation, with the underpayment variance flag (RCM-FR-050).
  attributes:
    - { name: carc_code, data_type: string }
    - { name: rarc_code, data_type: string }
    - { name: allowed_amount, data_type: float }
    - { name: paid_amount, data_type: float }
    - { name: payment_variance, data_type: float }
    - { name: underpayment_flag, data_type: string }
  relationships:
    - { name: claim, target: claim, cardinality: belongs_to }
    - { name: payer, target: payer, cardinality: belongs_to }
- entity_key: denial
  name: "Claim denial"
  description: >-
    A payer denial on a claim, CARC/RARC coded and classified per BRD 26 BR-4
    (administrative, coverage, documentation, bundling, timely-filing), with
    the payer-configured appeal window and current appeal state.
  attributes:
    - { name: carc_code, data_type: string }
    - { name: rarc_code, data_type: string }
    - { name: denial_reason_text, data_type: string }
    - { name: denial_category, data_type: string }
    - { name: denied_amount, data_type: float }
    - { name: appeal_status, data_type: string }
    - { name: appeal_deadline_days, data_type: integer }
  relationships:
    - { name: claim, target: claim, cardinality: belongs_to }
    - { name: payer, target: payer, cardinality: belongs_to }
- entity_key: ar_item
  name: "A/R follow-up item"
  description: >-
    An open receivable on the follow-up worklist: aging bucket, insurance vs
    patient balance, and the AR-prioritizer follow-up score (RCM-FR-060).
  attributes:
    - { name: aging_bucket, data_type: string }
    - { name: over_90, data_type: string }
    - { name: balance_type, data_type: string, description: "insurance | patient" }
    - { name: balance_amount, data_type: float }
    - { name: days_outstanding, data_type: integer }
    - { name: followup_priority_score, data_type: integer }
    - { name: last_action, data_type: string }
  relationships:
    - { name: claim, target: claim, cardinality: belongs_to }
    - { name: payer, target: payer, cardinality: belongs_to }
