# Governed SoR write-back adapters (ingestion-service inc12): OUTGOING
# connections declared with skip_test + EMPTY secrets — the tenant completes
# real credentials/endpoints in Data → Connections, and every write executes
# proposal-mode with four-eyes (no autonomous SoR change). The URLs/hosts are
# placeholders the tenant replaces; nothing is called at install.
- name: "Core processor dispute status sync"
  connector_type: http_api
  direction: outgoing
  config:
    method: POST
    url: "https://core-processor.example.invalid/api/v1/disputes/status"
    headers: { Content-Type: "application/json" }
- name: "Issuer dispute ledger upsert"
  connector_type: postgres
  direction: outgoing
  config:
    host: "issuer-dispute-db.example.invalid"
    port: 5432
    database: disputes
    username: datacern_writeback
    ssl_mode: require
