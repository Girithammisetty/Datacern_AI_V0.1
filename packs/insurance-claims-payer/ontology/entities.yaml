# Domain ontology (dataset-service inc11): the entity TYPES this vertical
# operates on and their typed relationships — the type-level model behind the
# payer-claims / payer-denials / payer-appeals / payer-prior-auth-requests
# binding contracts. Attribute names match the contract columns so the
# ontology describes data that actually lands.
- entity_key: member
  name: Member
  description: "The covered plan member whose care is claimed, denied, or authorized."
  attributes:
    - { name: member_state, data_type: string }
  relationships:
    - { name: claims, target: claim, cardinality: has_many }
    - { name: prior_auth_requests, target: prior_auth_request, cardinality: has_many }
- entity_key: provider
  name: Provider
  description: "The rendering/billing provider (NPI-identified) submitting claims and PA requests."
  attributes:
    - { name: provider_npi, data_type: string }
    - { name: provider_specialty, data_type: string }
  relationships:
    - { name: claims, target: claim, cardinality: has_many }
    - { name: prior_auth_requests, target: prior_auth_request, cardinality: has_many }
- entity_key: claim
  name: Claim
  description: "An adjudicated medical claim line: billed/allowed/paid amounts and paid-vs-denied status."
  attributes:
    - { name: plan_year, data_type: integer }
    - { name: product_type, data_type: string, description: "HMO | PPO | EPO | MEDICARE_ADVANTAGE" }
    - { name: service_month, data_type: string }
    - { name: place_of_service, data_type: string }
    - { name: cpt_code, data_type: string }
    - { name: icd10_code, data_type: string }
    - { name: service_line, data_type: string }
    - { name: billed_amount, data_type: float }
    - { name: allowed_amount, data_type: float }
    - { name: paid_amount, data_type: float }
    - { name: status, data_type: string, description: "paid | denied" }
    - { name: network_status, data_type: string }
  relationships:
    - { name: member, target: member, cardinality: belongs_to }
    - { name: provider, target: provider, cardinality: belongs_to }
    - { name: denial, target: denial, cardinality: has_one }
- entity_key: denial
  name: "Claim denial"
  description: "The adverse determination on a claim, carrying the CARC reason code and the deciding reviewer."
  attributes:
    - { name: denial_reason_code, data_type: string, description: "CARC code" }
    - { name: denial_reason_text, data_type: string }
    - { name: cpt_code, data_type: string }
    - { name: service_line, data_type: string }
    - { name: decision_by, data_type: string }
    - { name: decision_month, data_type: string }
    - { name: appealed, data_type: string, description: "yes | no" }
  relationships:
    - { name: claim, target: claim, cardinality: belongs_to }
    - { name: appeals, target: appeal, cardinality: has_many }
- entity_key: appeal
  name: Appeal
  description: "A provider/member challenge to a denial, escalating by level toward external review."
  attributes:
    - { name: level, data_type: integer }
    - { name: submitted_by, data_type: string }
    - { name: status, data_type: string, description: "pending | upheld | overturned" }
    - { name: verdict_by, data_type: string }
    - { name: denial_reason_code, data_type: string }
    - { name: cpt_code, data_type: string }
    - { name: potential_value, data_type: float }
  relationships:
    - { name: denial, target: denial, cardinality: belongs_to }
    - { name: claim, target: claim, cardinality: belongs_to }
- entity_key: prior_auth_request
  name: "Prior-authorization request"
  description: >-
    A pre-service authorization request reviewed against plan medical-necessity
    criteria on the regulatory turnaround clock (expedited vs standard window).
  attributes:
    - { name: requested_service, data_type: string }
    - { name: cpt_code, data_type: string }
    - { name: icd10_code, data_type: string }
    - { name: urgency, data_type: string, description: "standard | urgent" }
    - { name: status, data_type: string, description: "pending | approved | denied" }
    - { name: turnaround_hours, data_type: float }
    - { name: agent_recommendation, data_type: string }
    - { name: agent_confidence, data_type: float }
  relationships:
    - { name: member, target: member, cardinality: belongs_to }
    - { name: provider, target: provider, cardinality: belongs_to }
