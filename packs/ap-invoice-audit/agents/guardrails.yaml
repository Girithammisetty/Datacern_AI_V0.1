# Per-agent security envelopes (BRD 53 inc2 / PA-FR-060) for the fixed platform
# agents this pack specializes via agent_configs. These are MACHINE-enforced in
# the shared agent graph independent of the prompt: a token budget cap per
# session, PII-egress discipline, and (bind_workspace) confinement of grounding
# reads to the workspace the pack is installed into. budget is clamped DOWN to
# the operator platform ceiling server-side (BR-8) — never up. Installed onto the
# tenant agent config; reversible on uninstall (the envelope clears to {}).
- agent_key: case-triage
  # Triage reasons over one AP exception at a time; a bounded budget keeps a
  # single decision cheap and refuses runaway loops.
  budget: { max_tokens_per_session: 60000 }
  # AP exceptions carry vendor bank details / TINs — never let raw PII leave the
  # boundary, and redact it from any grounding the agent surfaces.
  pii: { block_pii_egress: true, redact: true }
  # Confine grounding reads to the install workspace (the materializer substitutes
  # the real workspace UUID at install time).
  bind_workspace: true
- agent_key: analytics
  # The analytics copilot summarizes aggregates, not row-level PII — a smaller
  # budget, redaction on, egress block left to the tenant's discretion.
  budget: { max_tokens_per_session: 40000 }
  pii: { redact: true }
  bind_workspace: true
