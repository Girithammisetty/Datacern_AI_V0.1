# Governed SoR write-back adapters (ingestion-service OUTGOING connections,
# inc12). Each declares a proposal-mode write-back path the AP vertical needs —
# place/release payment blocks in the ERP, park/reject invoices back to the
# vendor portal, post negotiated credit memos. Materialized as governed outgoing
# connections with skip_test + EMPTY secrets: the pack declares the adapter
# shape/target; the tenant supplies real credentials via Data > Connections; and
# EVERY write executes proposal-mode with four-eyes approval — no autonomous
# payment movement or vendor-master change, ever (the config below is a template
# the tenant completes, never a live secret).
- name: "AP ERP payment-control write-back"
  connector_type: postgres
  config:
    host: erp-ap.internal
    port: 5432
    database: ap_subledger
    username: datacern_writeback
    ssl_mode: require
- name: "Recovery credit-memo posting"
  connector_type: postgres
  config:
    host: erp-ap.internal
    port: 5432
    database: ap_subledger
    username: datacern_writeback
    ssl_mode: require
- name: "Vendor-portal invoice-disposition write-back"
  connector_type: http_api
  config:
    method: POST
    url: https://vendor-portal.internal/api/invoice-dispositions
