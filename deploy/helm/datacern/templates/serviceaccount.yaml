{{- /* Shared ServiceAccount. Cloud workload-identity annotations come from values. */}}
{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "datacern.serviceAccountName" . }}
  labels:
    {{- include "datacern.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
