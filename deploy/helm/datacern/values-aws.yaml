# AWS (EKS) overrides. Cloud-specific only — everything else comes from values.yaml.
# Infra endpoints below are PLACEHOLDERS; the CD workflow overrides them with
# Terraform outputs (deploy/terraform/aws) via --set / -f.

global:
  # ECR registry for the account/region.
  registry: 123456789012.dkr.ecr.us-east-1.amazonaws.com

serviceAccount:
  create: true
  annotations:
    # IRSA: bind the SA to an IAM role for keyless S3/Secrets access.
    eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/datacern-workload  # PLACEHOLDER

ingress:
  className: alb
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    # alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:...  # PLACEHOLDER

# Persistent volumes (if any stateful add-on charts are enabled) use gp3.
storageClass: gp3

externalSecrets:
  enabled: true
  secretStoreRef:
    name: datacern-aws-secrets
    kind: ClusterSecretStore   # backed by AWS Secrets Manager
  remoteKeyPrefix: datacern/prod

# Managed-infra endpoints — PLACEHOLDERS overridden by CD from Terraform outputs.
config:
  ICEBERG_WAREHOUSE: s3://datacern-prod-warehouse/
  OBJECTSTORE_REGION_HINT: us-east-1   # informational; real creds via datacern-secrets
  # POSTGRES_HOST / REDIS_URL / KAFKA_BOOTSTRAP are SECRETS (datacern-secrets),
  # populated from Secrets Manager — not set here.
  #
  # Real Amazon OpenSearch Service domain (B9/B10, scalability audit) — CD sets
  # this from the `opensearch_endpoint` Terraform output; number_of_shards
  # matches `opensearch_data_node_count` (default 3) so every tenant index
  # actually spreads across every provisioned node.
  OPENSEARCH_URL: https://PLACEHOLDER.us-east-1.es.amazonaws.com
  OPENSEARCH_NUMBER_OF_SHARDS: "3"
  # OPENSEARCH_USERNAME/OPENSEARCH_PASSWORD (fine-grained access control master
  # user, generated by Terraform into datacern-secrets as OPENSEARCH_USERNAME/
  # OPENSEARCH_PASSWORD) are NOT yet wired into case-service's env here — the
  # chart's env: entries are unconditional across all 4 cloud overlays, and
  # dev/gcp/azure/hetzner have no such secret keys, so adding a required
  # secretKeyRef here would break pod startup on every other cloud. Needs the
  # Deployment template to support an optional secretKeyRef (or a per-cloud
  # conditional case-service env block) before this can be wired safely —
  # tracked as a follow-up in docs/brd/58_production_hardening_BRD.md's B9/B10
  # log entry (case-service's search.New already accepts Username/Password;
  # only the last-mile Helm wiring is outstanding).
  #
  # BYO observability backend (opt-in — uncomment + point at your own collector):
  # DATACERN_OTEL_ENABLED: "true"
  # OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector.observability.svc:4317   # in-cluster collector
  # OTEL_EXPORTER_OTLP_ENDPOINT: <your-datadog-agent>:4317               # or a vendor OTLP/gRPC endpoint
